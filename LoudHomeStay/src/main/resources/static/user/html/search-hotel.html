    <script>
    function setView(type) {
      const container = document.getElementById("hotelContainer");

      if (type === "grid") {
        container.classList.remove("list-view");
        container.classList.add("grid-view");
      } else {
        container.classList.remove("grid-view");
        container.classList.add("list-view");
      }
    }
  </script>
  <script>
    const sortSelect = document.getElementById("sortSelect");

    sortSelect.addEventListener("change", function () {
      let cards = Array.from(document.querySelectorAll(".hotel-card"));

      cards.sort((a, b) => {
        let ratingA = parseFloat(a.querySelector(".score").innerText);
        let ratingB = parseFloat(b.querySelector(".score").innerText);

        let priceA = parseInt(
          a.querySelector(".price").innerText.replace(/\D/g, ""),
        );
        let priceB = parseInt(
          b.querySelector(".price").innerText.replace(/\D/g, ""),
        );

        switch (this.value) {
          case "ratingDesc":
            return ratingB - ratingA;

          case "ratingAsc":
            return ratingA - ratingB;

          case "priceDesc":
            return priceB - priceA;

          case "priceAsc":
            return priceA - priceB;
        }
      });

      const container = document.getElementById("hotelContainer");

      container.innerHTML = "";
      cards.forEach((c) => container.appendChild(c));
    });
  </script>
