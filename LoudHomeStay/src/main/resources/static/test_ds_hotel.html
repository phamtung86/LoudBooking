<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body {
      font-family: Inter;
      background: #f5f5f5;
    }

    /* top bar */
    .hotel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .hotel-header h3 {
      font-size: 18px;
      margin: 0;
    }
    .hotel-page {
      width: 70%;
      margin: 0 auto;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .result b {
      font-size: 22px;
    }

    .result span {
      color: #555;
      font-size: 14px;
    }

    .hotel-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      overflow: hidden;
      transition: 0.2s;
    }

    .hotel-card:hover {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }
    .list-view .hotel-card {
      display: flex;
    }

    .list-view img {
      width: 270px;
      height: 180px;
      object-fit: cover;
    }

    .controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .view-buttons button {
      border: none;
      background: #e8f1ff;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    .hotel-info {
      flex: 1;
      padding: 16px;
    }

    .hotel-info h3 {
      font-size: 18px;
      margin-bottom: 6px;
    }

    .rating {
      color: #003580;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .address {
      color: #666;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .desc {
      color: #555;
      font-size: 14px;
    }
    .price-box {
      width: 200px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      border-left: 1px solid #eee;
    }

    .price {
      color: #ff5a1f;
      font-size: 22px;
      font-weight: 700;
    }

    .price-range {
      font-size: 13px;
      color: #777;
      margin-top: 3px;
    }

    .book-btn {
      background: #ff5a1f;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
    }

    .grid-view .hotel-card {
      display: flex;
      flex-direction: column;
    }

    .grid-view img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .grid-view .hotel-info {
      padding: 14px;
    }

    .grid-view .price-box {
      width: 100%;
      border-left: none;
      border-top: 1px solid #eee;
      align-items: flex-start;
    }
    .view-buttons {
      display: flex;
      gap: 6px;
    }

    .view-buttons button {
      border: none;
      background: #e8f1ff;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .view-buttons button:hover {
      background: #d6e6ff;
    }

    /* container */

    .hotel-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* LIST VIEW */

    .list-view .hotel-card {
      display: flex;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .list-view img {
      width: 260px;
      height: 180px;
      object-fit: cover;
    }

    .hotel-info {
      flex: 1;
      padding: 15px;
    }

    .list-view .hotel-info {
      position: relative;
    }

    .list-view .hotel-header {
      display: block;
    }

    .list-view .rating-box {
      position: absolute;
      top: 15px;
      right: 15px;
    }

    .rating {
      color: #003580;
      font-weight: 600;
      margin: 5px 0;
    }
    .rating-box {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rating-score {
      background: #003580;
      color: white;
      font-weight: 700;
      padding: 6px 9px;
      border-radius: 6px 6px 6px 0;
      font-size: 14px;
    }

    .rating-level {
      font-weight: 600;
      font-size: 14px;
    }

    .rating-count {
      font-size: 13px;
      color: #666;
    }

    .address {
      color: #666;
      font-size: 14px;
    }

    .desc {
      margin-top: 6px;
      color: #555;
    }

    /* price */

    .price-box {
      width: 180px;
      padding: 15px;
      text-align: right;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .price {
      color: #ff5a1f;
      font-size: 22px;
      font-weight: 700;
    }

    .book-btn {
      background: #003580;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* GRID VIEW */

    .grid-view {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .grid-view .hotel-card {
      flex-direction: column;
    }

    .grid-view img {
      width: 100%;
      height: 200px;
    }

    .grid-view .price-box {
      width: 100%;
      text-align: left;
    }
    .grid-view .hotel-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }

    .grid-view .rating-box {
      position: static;
    }
    .grid-view .rating-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid-view .rating-score {
      order: 1;
    }

    .grid-view .rating-text {
      order: 2;
      display: flex;
      flex-direction: column;
    }
  </style>
  <body>
    <div class="hotel-page">
      <div class="top-bar">
        <div class="result">
          <b>Đà Lạt</b><br />
          <span id="resultCount">569 nơi lưu trú được tìm thấy</span>
        </div>

        <div class="controls">
          <select id="sortSelect">
            <option value="ratingDesc">Đánh giá cao → thấp</option>
            <option value="ratingAsc">Đánh giá thấp → cao</option>
            <option value="priceDesc">Giá cao → thấp</option>
            <option value="priceAsc">Giá thấp → cao</option>
          </select>

          <div class="view-buttons">
            <button onclick="setView('list')">
              <i class="fa fa-bars"></i>
            </button>
            <button onclick="setView('grid')"><i class="fa fa-th"></i></button>
          </div>
        </div>
      </div>

      <div id="hotelContainer" class="hotel-container list-view">
        <!-- HOTEL CARD -->

        <div class="hotel-card">
          <img src="images/hotel1.jpg" />

          <div class="hotel-info">
            <div class="hotel-header">
              <h3>The Apartments by The Sloane Club</h3>

              <div class="rating-box">
                <div class="rating-text">
                  <div class="rating-level">Tuyệt vời</div>
                  <div class="rating-count">258 đánh giá</div>
                </div>
                <div class="rating-score">8.9</div>
              </div>
            </div>

            <div class="address">📍 phường 10, Đà Lạt</div>

            <div class="desc">
              Du ngoạn trên thuyền máy • Hồ nước nóng Jacuzzi
            </div>
          </div>
          <div class="price-box">
            <div class="price">81.231 VND</div>

            <div class="price-range">(81k - 120k)</div>

            <button class="book-btn">Chọn phòng</button>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    function setView(type) {
      const container = document.getElementById("hotelContainer");

      if (type === "grid") {
        container.classList.remove("list-view");
        container.classList.add("grid-view");
      } else {
        container.classList.remove("grid-view");
        container.classList.add("list-view");
      }
    }
  </script>
  <script>
    const sortSelect = document.getElementById("sortSelect");

    sortSelect.addEventListener("change", function () {
      let cards = Array.from(document.querySelectorAll(".hotel-card"));

      cards.sort((a, b) => {
        let ratingA = parseFloat(a.querySelector(".score").innerText);
        let ratingB = parseFloat(b.querySelector(".score").innerText);

        let priceA = parseInt(
          a.querySelector(".price").innerText.replace(/\D/g, ""),
        );
        let priceB = parseInt(
          b.querySelector(".price").innerText.replace(/\D/g, ""),
        );

        switch (this.value) {
          case "ratingDesc":
            return ratingB - ratingA;

          case "ratingAsc":
            return ratingA - ratingB;

          case "priceDesc":
            return priceB - priceA;

          case "priceAsc":
            return priceA - priceB;
        }
      });

      const container = document.getElementById("hotelContainer");

      container.innerHTML = "";
      cards.forEach((c) => container.appendChild(c));
    });
  </script>
</html>
