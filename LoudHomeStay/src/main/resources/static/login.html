<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng nhập</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        height: 100vh;
        margin: 0;
        background: url("1.jpg") no-repeat center center / cover;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      /* sóng màu góc nền */
      body::before {
        content: "";
        position: absolute;
        top: -220px;
        left: -220px;
        width: 520px;
        height: 520px;
        background: linear-gradient(135deg, #9dbbff, #c7ddff);
        border-radius: 50%;
        filter: blur(50px);
        opacity: 0.85;
      }

      body::after {
        content: "";
        position: absolute;
        bottom: -240px;
        right: -240px;
        width: 560px;
        height: 560px;
        background: linear-gradient(135deg, #bfe7ff, #dbeafe);
        border-radius: 50%;
        filter: blur(55px);
        opacity: 0.9;
      }

      .container {
        display: flex;
        width: 820px;
        max-width: 95%;
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        position: relative;
      }

      /* hiệu ứng loang trong khung */
      .container::before {
        content: "";
        position: absolute;
        top: -45%;
        left: -20%;
        width: 140%;
        height: 100%;
        background: linear-gradient(120deg, #dbeafe, #a5c8ff);
        opacity: 0.75;
        border-radius: 50%;
        filter: blur(70px);
        z-index: 0;
      }

      /* LEFT */
      .left {
        flex: 1;
        color: #1f2937;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        z-index: 1;
      }

      .left h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .left p {
        color: #4b5563;
        line-height: 1.6;
      }

      /* RIGHT - FORM */
      .right {
        flex: 1;
        padding: 38px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        margin: 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        position: relative;
        z-index: 2;
      }

      .right h2 {
        text-align: center;
        margin-bottom: 24px;
        color: #1f2937;
        font-size: 22px;
        font-weight: 700;
      }

      /* input */
      .input-group {
        margin-bottom: 14px;
      }

      .input-group label {
        font-size: 13px;
        color: #4b5563;
        font-weight: 500;
      }

      .input-group input {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        outline: none;
        transition: 0.2s;
      }

      .input-group input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
      }

      /* button */
      button {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.25s;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(37, 99, 235, 0.4);
      }

      /* message */
      .msg {
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
      }
      .msg.success {
        color: #16a34a;
        background: #dcfce7;
        padding: 8px 12px;
        border-radius: 8px;
        margin-top: 12px;
        font-weight: 500;
      }
      .msg.error {
        color: #dc2626;
        background: #fee2e2;
        padding: 8px 12px;
        border-radius: 8px;
        margin-top: 12px;
        font-weight: 500;
      }

      .link {
        text-align: center;
        margin-top: 16px;
        font-size: 14px;
      }

      .link a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      .link a:hover {
        text-decoration: underline;
      }

      /* responsive */
      @media (max-width: 768px) {
        .container {
          flex-direction: column;
        }
        .left {
          padding: 25px;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- LEFT: giới thiệu -->
      <div class="left">
        <h1>Nền tảng mua sắm và đặt hàng trực tuyến</h1>
        <p>
          Đăng nhập để quản lý tài khoản, theo dõi đơn hàng, trải nghiệm mua sắm
          tiện lợi và sử dụng các dịch vụ trực tuyến một cách an toàn, nhanh
          chóng và hiệu quả.
        </p>
      </div>

      <!-- RIGHT: form đăng nhập -->
      <div class="right">
        <h2>Đăng nhập tài khoản</h2>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Nhập email" />
        </div>

        <div class="input-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" placeholder="Nhập mật khẩu" />
        </div>

        <button onclick="login()">Đăng nhập</button>

        <div class="msg" id="msg"></div>

        <div class="link">
          Chưa có tài khoản? <a href="register.html">Đăng ký</a>
        </div>
      </div>
    </div>
    <script>
      // Lấy username từ localStorage
      const username = localStorage.getItem("username") || "Người dùng";

      // Gán vào sidebar
      const usernameEl = document.getElementById("username");
      if (usernameEl) {
        usernameEl.innerText = username;
      }

      // Gán avatar bằng chữ cái đầu của tên
      const avatarEl = document.getElementById("avatar");
      if (avatarEl) {
        avatarEl.innerText = username
          .split(" ")
          .map((word) => word[0].toUpperCase())
          .join("");
      }
    </script>
    <script>
      async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const msg = document.getElementById("msg");

        // validate
        if (!email || !password) {
          msg.className = "msg error";
          msg.innerText = "Vui lòng nhập email và mật khẩu";
          return;
        }

        try {
          const res = await fetch("http://localhost:8080/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password }),
          });

          if (!res.ok) {
            const err = await res.json();

            msg.className = "msg error";

            if (err.message.includes("khóa")) {
              msg.innerText = "Tài khoản của bạn đã bị khóa. Liên hệ admin!";
            } else {
              msg.innerText = err.message || "Email hoặc mật khẩu không đúng";
            }

            return;
          }

          const data = await res.json();

          /*
            Backend trả về dạng:
            {
              accessToken: "...",
              tokenType: "Bearer",
              user: {
                id, username, email, phone, role
              }
            }
          */

          // lưu localStoragee
          localStorage.setItem("accessToken", data.accessToken);
          localStorage.setItem("refreshToken", data.refreshToken);

          localStorage.setItem("userId", data.userId);
          localStorage.setItem("username", data.username);
          localStorage.setItem("email", data.email);
          localStorage.setItem("role", data.role);

          const role = data.role;

          msg.className = "msg success";
          msg.innerText = "Đăng nhập thành công!";

          setTimeout(() => {
            if (data.role === "ADMIN") {
              window.location.href = "admin/html/dashboard.html";
            } else if (data.role === "MANAGER") {
              // thêm dòng này
              window.location.href = "manager/html/dashboard.html";
            } else {
              window.location.href = "user/html/home.html";
            }
          }, 800);
        } catch (error) {
          msg.className = "msg error";
          msg.innerText = "Không kết nối được server";
          console.error(error);
        }
      }
    </script>
    <script>
      window.addEventListener("load", () => {
        document.getElementById("email").value = "";
        document.getElementById("password").value = "";
      });
    </script>
  </body>
</html>
