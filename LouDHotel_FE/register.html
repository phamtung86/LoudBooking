<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Đăng ký tài khoản</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      body {
        height: 100vh;
        margin: 0;
        background: url("1.jpg") no-repeat center center / cover;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      /* Sóng góc trên trái */
      body::before {
        content: "";
        position: absolute;
        top: -200px;
        left: -200px;
        width: 500px;
        height: 500px;
        background: linear-gradient(135deg, #9dbbff, #c7ddff);
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.8;
      }

      /* Sóng góc dưới phải */
      body::after {
        content: "";
        position: absolute;
        bottom: -220px;
        right: -220px;
        width: 550px;
        height: 550px;
        background: linear-gradient(135deg, #bfe7ff, #dbeafe);
        border-radius: 50%;
        filter: blur(50px);
        opacity: 0.85;
      }

      .container {
        display: flex;
        width: 820px;
        max-width: 95%;
        background: #fff;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }

      .container::before {
        content: "";
        position: absolute;
        top: -45%;
        left: -20%;
        width: 140%;
        height: 100%;
        background: linear-gradient(120deg, #dbeafe, #a5c8ff);
        opacity: 0.8;
        z-index: 0;
        border-radius: 50%;
        filter: blur(60px);
      }

      .left {
        flex: 1;
        background: transparent;
        color: #1f2937;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        z-index: 1;
      }

      .left h1 {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
      }

      .left p {
        color: #4b5563;
        line-height: 1.6;
      }

      .right {
        flex: 1;
        padding: 38px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        margin: 28px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        position: relative;
        z-index: 2;
      }

      .right h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
      }

      .input-group {
        margin-bottom: 14px;
        position: relative;
      }

      .input-group i {
        position: absolute;
        top: 50%;
        left: 12px;
        transform: translateY(-50%);
        color: #888;
      }

      input {
        width: 100%;
        padding: 12px 12px 12px 38px;
        border-radius: 8px;
        border: 1px solid #ddd;
        outline: none;
        transition: 0.2s;
      }

      input:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.15);
      }

      .input-row {
        display: flex;
        gap: 10px;
      }

      .input-row .input-group {
        flex: 1;
      }

      button {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        color: white;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: 0.25s;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 28px rgba(37, 99, 235, 0.4);
      }

      .msg {
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
      }

      .msg.success {
        color: #16a34a;
        background: #dcfce7;
        padding: 8px 12px;
        border-radius: 8px;
        margin-top: 12px;
        font-weight: 500;
      }
      .msg.error {
        color: #dc2626;
        background: #fee2e2;
        padding: 8px 12px;
        border-radius: 8px;
        margin-top: 12px;
        font-weight: 500;
      }

      .link {
        text-align: center;
        margin-top: 16px;
        font-size: 14px;
      }

      .link a {
        color: #007bff;
        text-decoration: none;
        font-weight: 600;
      }

      .link a:hover {
        text-decoration: underline;
      }

      @media (max-width: 768px) {
        .container {
          flex-direction: column;
        }
        .left {
          padding: 25px;
          text-align: center;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="left">
        <h1>Nền tảng mua sắm và đặt hàng trực tuyến</h1>
        <p>
          Đăng ký tài khoản để mua sắm, theo dõi đơn hàng và sử dụng các dịch vụ
          một cách nhanh chóng, an toàn và tiện lợi.
        </p>
      </div>

      <div class="right">
        <h2>Đăng ký tài khoản</h2>

        <div class="input-group">
          <i class="fa fa-user"></i>
          <input type="text" id="username" placeholder="Tên tài khoản" />
        </div>
        <div class="input-row">
          <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" id="firstName" placeholder="Họ" />
          </div>

          <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" id="lastName" placeholder="Tên" />
          </div>
        </div>

        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input type="email" id="email" placeholder="Email" />
        </div>

        <div class="input-group">
          <i class="fa fa-phone"></i>
          <input type="text" id="phone" placeholder="Số điện thoại" />
        </div>

        <div class="input-group">
          <i class="fa fa-lock"></i>
          <input type="password" id="password" placeholder="Mật khẩu" />
        </div>

        <button onclick="register()">Đăng ký</button>

        <div class="msg" id="msg"></div>

        <div class="link">
          Đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
      </div>
    </div>
    <script>
      async function register() {
        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value.trim();
        const firstName = document.getElementById("firstName").value.trim();
        const lastName = document.getElementById("lastName").value.trim();
        const msg = document.getElementById("msg");

        msg.className = "msg";
        msg.innerText = "";

        // validate FE
        if (
          !username ||
          !firstName ||
          !lastName ||
          !email ||
          !phone ||
          !password
        ) {
          msg.classList.add("error");
          msg.innerText = "Vui lòng nhập đầy đủ thông tin!";
          return;
        }

        if (password.length < 6) {
          msg.classList.add("error");
          msg.innerText = "Mật khẩu phải ít nhất 6 ký tự!";
          return;
        }

        try {
          const res = await fetch("http://localhost:8080/api/auth/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: username,
              email: email,
              phone: phone,
              password: password,
              firstName: firstName,
              lastName: lastName,
            }),
          });

          if (!res.ok) {
            const errorData = await res.json();
            msg.classList.add("error");
            msg.innerText = errorData.message || "Đăng ký thất bại!";
            return;
          }

          msg.classList.add("success");
          msg.innerText = "Đăng ký thành công! Đang chuyển sang đăng nhập...";

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
        } catch (err) {
          msg.classList.add("error");
          msg.innerText = "Không thể kết nối tới server!";
          console.error(err);
        }
      }
    </script>
  </body>
</html>
